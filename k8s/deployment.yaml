apiVersion: apps/v1
kind: Deployment
metadata:
  name: htn-pilot
  namespace: htn-pilot
  labels:
    app: htn-pilot
    component: web
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 3                         # Minimum for HA — HPA scales this up/down
  selector:
    matchLabels:
      app: htn-pilot
      component: web

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1                     # One extra pod during rollout
      maxUnavailable: 0               # Zero-downtime — never kill a pod until replacement is ready

  template:
    metadata:
      labels:
        app: htn-pilot
        component: web
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"

    spec:
      # Spread pods across availability zones
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: htn-pilot

      # Security context — run as non-root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      # Graceful shutdown: allow 60s for in-flight requests to complete
      terminationGracePeriodSeconds: 60

      containers:
        - name: htn-pilot
          image: ECR_REGISTRY/htn-pilot:latest   # Replaced by CI/CD
          imagePullPolicy: Always

          ports:
            - containerPort: 3000
              protocol: TCP

          # Resource limits — sized for p99 clinical assessment workload
          # Tune after load testing: run `kubectl top pods` in staging
          resources:
            requests:
              cpu: 250m               # 0.25 vCPU baseline
              memory: 512Mi
            limits:
              cpu: 1000m              # Burst to 1 vCPU during AI assessment calls
              memory: 1Gi

          # Secrets — injected from Kubernetes secrets, never in image
          envFrom:
            - secretRef:
                name: htn-pilot-secrets
            - configMapRef:
                name: htn-pilot-config

          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: PORT
              value: "3000"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          # Liveness probe — restart the pod if it deadlocks
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 60   # Wait for Next.js to boot
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # Readiness probe — only send traffic when DB is reachable
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # Startup probe — extra time during first boot / Prisma init
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 12      # 12 × 10s = 120s max startup time
            successThreshold: 1

          # Container security
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # Writable scratch space for Next.js cache
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nextjs-cache
              mountPath: /app/.next/cache

          # Lifecycle hook — drain connections before pod terminates
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

      volumes:
        - name: tmp
          emptyDir: {}
        - name: nextjs-cache
          emptyDir:
            sizeLimit: 500Mi

      # Image pull secret for private ECR
      imagePullSecrets:
        - name: ecr-credentials

      # Node affinity — prefer nodes with SSD
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              preference:
                matchExpressions:
                  - key: node.kubernetes.io/disk-type
                    operator: In
                    values: [ssd]
        # Soft anti-affinity — prefer different nodes for each replica
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [htn-pilot]
                topologyKey: kubernetes.io/hostname
