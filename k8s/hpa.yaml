apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: htn-pilot
  namespace: htn-pilot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: htn-pilot

  minReplicas: 3                   # Always 3 for HA across AZs
  maxReplicas: 20                  # Cap at 20 to control costs — adjust based on load

  metrics:
    # Scale on CPU — catches request processing spikes
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70   # Scale up at 70% CPU to stay ahead of demand

    # Scale on memory — catches Prisma connection pool growth
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60     # Wait 60s before scaling up (avoid flapping)
      policies:
        - type: Pods
          value: 2                        # Add max 2 pods per scaling event
          periodSeconds: 60
        - type: Percent
          value: 50                       # Or 50% of current replicas
          periodSeconds: 60
      selectPolicy: Max

    scaleDown:
      stabilizationWindowSeconds: 300    # Wait 5 min before scaling down (protect against spikes)
      policies:
        - type: Pods
          value: 1                        # Remove max 1 pod per event
          periodSeconds: 120
      selectPolicy: Min
---
# Pod Disruption Budget — guarantees availability during node maintenance / rollouts
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: htn-pilot-pdb
  namespace: htn-pilot
spec:
  minAvailable: 2                  # Always keep at least 2 pods running
  selector:
    matchLabels:
      app: htn-pilot
