# ─── HTN Pilot — Continuous Integration ──────────────────────────────────────
# Runs on every pull request and push to main.
# A PR cannot be merged unless all jobs pass.
#
# Jobs:
#   typecheck  — TypeScript strict mode compilation
#   lint       — ESLint (catches real bugs, not style)
#   build      — Next.js production build (catches build-time errors)
#   docker     — Verify Dockerfile builds successfully
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true        # Cancel stale PR runs when new commits push

env:
  NODE_VERSION: '20'
  # Dummy values for build — real secrets are never in CI env except deploy jobs
  DATABASE_URL: postgresql://test:test@localhost:5432/test
  JWT_SECRET: ci-test-jwt-secret-minimum-32-chars
  ANTHROPIC_API_KEY: ''
  FIELD_ENCRYPTION_KEY: ci-test-encryption-key-32-bytes

jobs:

  # ── TypeScript ──────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript strict check
        run: npx tsc --noEmit

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: ESLint
        run: npx next lint

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]             # No point building if types are broken
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Next.js build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: |
            .next/standalone
            .next/static
            public
          retention-days: 7

  # ── Docker build verification ─────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (verify only, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: htn-pilot:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=ci-${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_SHA=${{ github.sha }}

  # ── Security scan ─────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Audit npm dependencies
        run: npm audit --audit-level=high
        # High/critical vulnerabilities fail the build; moderate are warnings

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified
