# ─── HTN Pilot — Deployment Pipeline ────────────────────────────────────────
#
# Deployment flow:
#   1. Merge to main   → auto-deploy to STAGING
#   2. Tag vX.Y.Z      → deploy to PRODUCTION (requires manual approval)
#
# Infrastructure: AWS ECS Fargate + ECR
# Secrets: GitHub Actions Secrets (mapped from AWS Secrets Manager)
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID          — IAM user with ECR push + ECS deploy permissions
#   AWS_SECRET_ACCESS_KEY
#   AWS_REGION                 — e.g. us-east-1
#   ECR_REGISTRY               — e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com
#   ECR_REPOSITORY             — e.g. htn-pilot
#   ECS_CLUSTER_STAGING        — ECS cluster name (staging)
#   ECS_SERVICE_STAGING        — ECS service name (staging)
#   ECS_CLUSTER_PRODUCTION     — ECS cluster name (production)
#   ECS_SERVICE_PRODUCTION     — ECS service name (production)
#   SLACK_WEBHOOK_URL          — Deployment notifications
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches: [main]              # → Staging
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'  # → Production (semantic version tags)

env:
  NODE_VERSION: '20'
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:

  # ── Build & push Docker image ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.push.outputs.digest }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="staging-$(echo ${{ github.sha }} | cut -c1-8)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_SHA=${{ github.sha }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'            # Fail on critical/high CVEs

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── Deploy to Staging ─────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.htnpilot.com
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run database migrations (staging)
        run: |
          # Run migrations via ECS task before traffic switches over
          aws ecs run-task \
            --cluster ${{ secrets.ECS_CLUSTER_STAGING }} \
            --task-definition htn-pilot-migrate \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.PRIVATE_SUBNET_IDS }}],securityGroups=[${{ secrets.ECS_SECURITY_GROUP }}]}" \
            --overrides '{"containerOverrides":[{"name":"htn-pilot","command":["npx","prisma","migrate","deploy"]}]}' \
            --wait-for-completion

      - name: Deploy to ECS Staging
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:staging"

          # Update ECS service with new image — rolling deployment
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER_STAGING }} \
            --service ${{ secrets.ECS_SERVICE_STAGING }} \
            --force-new-deployment \
            --deployment-configuration "minimumHealthyPercent=100,maximumPercent=200"

          # Wait for deployment to stabilize
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER_STAGING }} \
            --services ${{ secrets.ECS_SERVICE_STAGING }}

      - name: Smoke test staging
        run: |
          sleep 15  # Allow health check to cycle
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.htnpilot.com/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Staging health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "✅ Staging health check passed"

      - name: Notify Slack — Staging deployed
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} *Staging deploy ${{ job.status }}*",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "${{ job.status == 'success' && '✅' || '❌' }} *HTN Pilot — Staging*\nVersion: `${{ needs.build-and-push.outputs.version }}`\nCommit: `${{ github.sha }}`\nBy: ${{ github.actor }}"
                }
              }]
            }

  # ── Deploy to Production ──────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: production              # GitHub Environment with required reviewers
      url: https://app.htnpilot.com
    if: startsWith(github.ref, 'refs/tags/v')
    # ⚠️  Manual approval required — configure in GitHub → Settings → Environments

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create deployment record
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              required_contexts: [],
              description: 'Production deploy ${{ github.ref_name }}'
            });
            return deployment.data.id;

      - name: Run database migrations (production)
        run: |
          echo "Running Prisma migrations on production database..."
          aws ecs run-task \
            --cluster ${{ secrets.ECS_CLUSTER_PRODUCTION }} \
            --task-definition htn-pilot-migrate-prod \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.PRIVATE_SUBNET_IDS_PROD }}],securityGroups=[${{ secrets.ECS_SECURITY_GROUP_PROD }}]}" \
            --overrides '{"containerOverrides":[{"name":"htn-pilot","command":["npx","prisma","migrate","deploy"]}]}' \
            --wait-for-completion
          echo "✅ Migrations complete"

      - name: Blue/Green deploy to ECS Production
        run: |
          # CodeDeploy manages blue/green — zero downtime via ALB traffic shifting
          aws deploy create-deployment \
            --application-name htn-pilot-prod \
            --deployment-group-name htn-pilot-prod-group \
            --deployment-config-name CodeDeployDefault.ECSCanary10Percent5Minutes \
            --description "Deploy ${{ github.ref_name }}"

      - name: Wait for production deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER_PRODUCTION }} \
            --services ${{ secrets.ECS_SERVICE_PRODUCTION }}

      - name: Production smoke tests
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://app.htnpilot.com/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Production health check FAILED — initiating rollback"
            aws ecs update-service \
              --cluster ${{ secrets.ECS_CLUSTER_PRODUCTION }} \
              --service ${{ secrets.ECS_SERVICE_PRODUCTION }} \
              --task-definition htn-pilot-prod-previous
            exit 1
          fi
          echo "✅ Production health check passed"

      - name: Create GitHub release
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ github.ref_name }}',
              name: 'HTN Pilot ${{ github.ref_name }}',
              generate_release_notes: true,
              prerelease: false
            });

      - name: Notify Slack — Production deployed
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ job.status == 'success' && '🚀' || '🔥' }} *Production deploy ${{ job.status }}*",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "${{ job.status == 'success' && '🚀' || '🔥 FAILED — rollback initiated' }} *HTN Pilot Production*\nVersion: `${{ github.ref_name }}`\nDigest: `${{ needs.build-and-push.outputs.image-digest }}`\nDeployed by: ${{ github.actor }}"
                }
              }]
            }
